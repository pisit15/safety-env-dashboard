<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Green background rounded square -->
  <rect x="2" y="8" width="72" height="78" rx="6" ry="6" fill="#2E8B3C"/>
  <!-- White E letter using paths for consistent rendering -->
  <g fill="white">
    <!-- E vertical bar -->
    <rect x="14" y="22" width="14" height="52" rx="1"/>
    <!-- E top bar -->
    <rect x="14" y="22" width="40" height="12" rx="1"/>
    <!-- E middle bar -->
    <rect x="14" y="42" width="34" height="11" rx="1"/>
    <!-- E bottom bar -->
    <rect x="14" y="62" width="40" height="12" rx="1"/>
  </g>
  <!-- @ symbol using path -->
  <g transform="translate(52, 28)">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#666" stroke-width="5"/>
    <circle cx="24" cy="24" r="11" fill="none" stroke="#666" stroke-width="4.5"/>
    <rect x="31" y="14" width="5" height="22" rx="2" fill="#666"/>
    <rect x="33" y="32" width="16" height="5" rx="2" fill="#666"/>
  </g>
</svg>
